name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Environment
        uses: actions/setup-node@v4 # Replace with setup-python, setup-java, etc.
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Run tests
        run: npm test
